<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ByteAI - Utilità</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='logo.ico') }}">
</head>
<body>
    <header>
        <div class="container">
            <a href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="ByteAI Logo" class="logo">
            </a>
            <nav>
                <ul>
                    <li><a href="{{ url_for('index') }}">Home</a></li>
                    <li><a href="{{ url_for('configurazioni') }}">Impostazioni</a></li>
                    <li><a href="{{ url_for('utilidades') }}">Utilità</a></li>
                    <li><a href="{{ url_for('about') }}">About</a></li>
                </ul>
            </nav>
            <button class="theme-toggle" onclick="toggleTheme()">&#9788;</button>
        </div>
    </header>
    <div class="container">
        <h1>Utilità</h1>
        <div class="utility-section">
            <p>In questa sezione, puoi eseguire diverse operazioni per gestire le tue immagini.</p>
            <!-- Botão para encontrar duplicatas -->
            <form action="{{ url_for('encontrar_duplicatas_route') }}" method="post">
                <button type="submit" class="utility-button">Trova Immagini Duplicate</button>
            </form>
            <!-- Outros botões ou funcionalidades podem ser adicionados qui -->
        </div>
    </div>
    <script>
        // Função para alternare il tema
        function toggleTheme() {
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
        }
    </script>
</body>
</html>
